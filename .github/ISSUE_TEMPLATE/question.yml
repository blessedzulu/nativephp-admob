name: Question
description: Ask about usage, setup, or behaviour
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Please check the README and existing issues first. If your question is broad (best practices, design tradeoffs), GitHub Discussions may be a better fit.
  - type: textarea
    id: question
    attributes:
      label: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you building? What have you tried?
